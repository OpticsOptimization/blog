<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | DRE Blog</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>
<body>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">DRE</span>
    </a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">Blog</a>
      <a href="https://github.com/OpticsOptimization/git" target="_blank">Algorithms</a>
      <a href="https://amazon.com" target="_blank" class="nav-cta">Buy the Book →</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Built on real math. Written for real engineers.</p>
      <p class="footer-sub">© {{ site.time | date: '%Y' }} Digital Rendering Engineering · <a href="https://github.com/OpticsOptimization" target="_blank">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
