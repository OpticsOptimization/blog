<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>hljs.highlightAll())</script>
</head>
<body>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="Home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" height="20">
        <text y="32" font-family="'DM Serif Display', Georgia, serif" font-size="28" fill="currentColor" letter-spacing="-1">DRE</text>
      </svg>
    </a>
    <nav class="nav-links">
      <a href="{{ '/' | relative_url }}">Blog</a>
      <a href="https://github.com/OpticsOptimization/git" target="_blank">Algorithms</a>
      <a href="https://amazon.com" target="_blank" class="nav-cta">Buy Book</a>
    </nav>
  </nav>

  <main>{{ content }}</main>

  <footer class="footer">
    <p>Digital Rendering Engineering · Physics of Light</p>
    <p><a href="https://github.com/OpticsOptimization" target="_blank">GitHub ↗</a></p>
  </footer>

</body>
</html>
