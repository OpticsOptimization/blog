<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | DRE Blog</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | escape }}">
  <link rel="icon" href="{{ '/assets/img/simbolo.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
  MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']] }
  };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>
<body>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <img src="{{ '/assets/img/simbolo.svg' | relative_url }}" class="nav-logo-mark" alt="DRE Logo">
      <span class="logo-text">DRE</span>
    </a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">Blog</a>
      <a href="https://dre.jmsage.pro">Store</a>
      <a href="https://dre.jmsage.pro/instrument.html">Light Simulator</a>
      <a href="https://dre.jmsage.pro" class="nav-cta" style="background:var(--glow-color); color:#000; padding:4px 12px; border-radius:2px; border:none;">Buy the Book →</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Built on real math. Written for real engineers.</p>
      <p class="footer-sub">© {{ site.time | date: '%Y' }} Digital Rendering Engineering · <a href="https://github.com/OpticsOptimization" target="_blank">GitHub</a></p>
    </div>
  </footer>

    <!-- Mermaid JS for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({startOnLoad:true, theme: 'dark'});</script>
</body>
</html>
